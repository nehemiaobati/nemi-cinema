services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    network_mode: host
    restart: always
    volumes:
      - ./volumes/jellyfin-config:/config
      - ./volumes/data:/data
      - ./volumes/data:/downloads

  jackett:
    image: linuxserver/jackett
    container_name: jackett
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/jackett-config:/config

  aria2:
    image: p3terx/aria2-pro
    container_name: aria2
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - RPC_SECRET=${ARIA2_SECRET}
      - RPC_PORT=6800
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/aria2-config:/config
      - ./volumes/data:/data
      - ./volumes/data:/downloads

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
      - WEBUI_PORT=8112
    volumes:
      - ./volumes/qbittorrent-config:/config
      - ./volumes/data:/data

  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/sonarr-config:/config
      - ./volumes/data:/data
      - ./volumes/data:/downloads

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/radarr-config:/config
      - ./volumes/data:/data
      - ./volumes/data:/downloads

  prowlarr:
    image: linuxserver/prowlarr
    container_name: prowlarr
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/prowlarr-config:/config

  lidarr:
    image: linuxserver/lidarr
    container_name: lidarr
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/lidarr-config:/config
      - ./volumes/data:/data
      - ./volumes/data:/downloads

  bazarr:
    image: linuxserver/bazarr
    container_name: bazarr
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/bazarr-config:/config
      - ./volumes/data:/data
      - ./volumes/data:/downloads

  readarr:
    image: ricetim/readarr-rresurrected:latest
    container_name: readarr
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/readarr-config:/config
      - ./volumes/data:/data
      - ./volumes/data:/downloads

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: host
    restart: always
    environment:
      - LOG_LEVEL=info
      - LOG_FILE=none
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=Africa/Nairobi
    volumes:
      - ./volumes/flaresolverr-config:/config
